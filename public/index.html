<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分身市场 - 管理后台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="login-page">
            <div class="login-box">
                <h1>AI分身市场</h1>
                <h2>管理后台</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="username" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="password" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
                <p class="hint">默认账号: admin / admin123</p>
            </div>
        </div>

        <!-- 主页面 -->
        <div id="main-page" class="main-page" style="display: none;">
            <!-- 侧边栏 -->
            <aside class="sidebar">
                <div class="logo">
                    <h3>AI分身市场</h3>
                </div>
                <nav class="nav-menu">
                    <a href="#" class="nav-item active" data-page="dashboard">
                        <span class="icon">📊</span> 仪表盘
                    </a>
                    <a href="#" class="nav-item" data-page="applications">
                        <span class="icon">📝</span> 创作者申请
                        <span class="badge" id="app-badge">0</span>
                    </a>
                    <a href="#" class="nav-item" data-page="avatars">
                        <span class="icon">🤖</span> 分身管理
                    </a>
                    <a href="#" class="nav-item" data-page="users">
                        <span class="icon">👥</span> 用户管理
                    </a>
                    <a href="#" class="nav-item" data-page="tasks">
                        <span class="icon">⚡</span> 任务监控
                    </a>
                    <a href="#" class="nav-item" data-page="settings">
                        <span class="icon">⚙️</span> 系统配置
                    </a>
                </nav>
                <div class="sidebar-footer">
                    <span id="user-info">管理员</span>
                    <button id="logout-btn" class="btn btn-sm">退出</button>
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="main-content">
                <!-- 顶部栏 -->
                <header class="header">
                    <h2 id="page-title">仪表盘</h2>
                    <div class="header-actions">
                        <span class="status-badge online">● 在线</span>
                    </div>
                </header>

                <!-- 页面内容 -->
                <div class="content">
                    <!-- 仪表盘 -->
                    <div id="dashboard-page" class="page">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon">🤖</div>
                                <div class="stat-info">
                                    <h3 id="stat-avatars">0</h3>
                                    <p>AI分身总数</p>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">👥</div>
                                <div class="stat-info">
                                    <h3 id="stat-users">0</h3>
                                    <p>注册用户</p>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">⚡</div>
                                <div class="stat-info">
                                    <h3 id="stat-tasks">0</h3>
                                    <p>今日任务</p>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">📝</div>
                                <div class="stat-info">
                                    <h3 id="stat-pending">0</h3>
                                    <p>待审核申请</p>
                                </div>
                            </div>
                        </div>

                        <div class="chart-section">
                            <h3>任务趋势（最近7天）</h3>
                            <div id="trend-chart" class="chart-placeholder">
                                <p>图表加载中...</p>
                            </div>
                        </div>
                    </div>

                    <!-- 创作者申请 -->
                    <div id="applications-page" class="page" style="display: none;">
                        <div class="filter-bar">
                            <select id="app-status-filter">
                                <option value="">全部状态</option>
                                <option value="pending">待审核</option>
                                <option value="approved">已通过</option>
                                <option value="rejected">已拒绝</option>
                            </select>
                        </div>
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>姓名</th>
                                    <th>邮箱</th>
                                    <th>专业领域</th>
                                    <th>状态</th>
                                    <th>申请时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="applications-list">
                                <tr><td colspan="7" class="empty">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分身管理 -->
                    <div id="avatars-page" class="page" style="display: none;">
                        <div class="action-bar">
                            <button class="btn btn-primary" id="add-avatar-btn">+ 新建分身</button>
                        </div>
                        <div class="avatar-grid" id="avatars-list">
                            <p class="empty">加载中...</p>
                        </div>
                    </div>

                    <!-- 用户管理 -->
                    <div id="users-page" class="page" style="display: none;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户名</th>
                                    <th>邮箱</th>
                                    <th>角色</th>
                                    <th>状态</th>
                                    <th>注册时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="users-list">
                                <tr><td colspan="7" class="empty">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 任务监控 -->
                    <div id="tasks-page" class="page" style="display: none;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>任务ID</th>
                                    <th>分身</th>
                                    <th>用户</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>完成时间</th>
                                </tr>
                            </thead>
                            <tbody id="tasks-list">
                                <tr><td colspan="6" class="empty">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 系统配置 -->
                    <div id="settings-page" class="page" style="display: none;">
                        <div class="settings-section">
                            <h3>平台设置</h3>
                            <div class="form-group">
                                <label>平台名称</label>
                                <input type="text" value="AI分身市场" id="platform-name">
                            </div>
                            <div class="form-group">
                                <label>注册开关</label>
                                <select id="registration-switch">
                                    <option value="open">开放注册</option>
                                    <option value="invite">邀请制</option>
                                    <option value="close">关闭注册</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" id="save-settings">保存设置</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 审核弹窗 -->
    <div id="review-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>审核申请</h3>
            <div id="review-details"></div>
            <div class="form-group">
                <label>审核结果</label>
                <select id="review-status">
                    <option value="approved">通过</option>
                    <option value="rejected">拒绝</option>
                </select>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="review-notes" rows="3"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancel-review">取消</button>
                <button class="btn btn-primary" id="confirm-review">确认</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
